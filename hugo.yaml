# Hugo configuration file
baseURL: https://docs.original-web.ru/
title: ORIGINAL Docs

# import hextra as module
module:
  imports:
    - path: github.com/imfing/hextra

markup:
  goldmark:
    renderer:
      unsafe: true
  highlight:
    noClasses: false

menu:
  main:
    - name: Документация
      pageRef: /docs
      weight: 1
    - name: О нас
      pageRef: /about
      weight: 2
    - name: orx.agency ↗
      url: "https://orx.agency"
      weight: 3
    - name: Search
      weight: 4
      params:
        type: search
    - name: GitHub
      weight: 5
      url: "https://github.com/ТУТ_ТВОЙ_USERNAME"
      params:
        icon: github

params:
  navbar:
    displayTitle: true
    displayLogo: false

  footer:
    displayCopyright: true
    displayPoweredBy: false

  editURL:
    enable: false